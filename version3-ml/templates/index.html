<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>PhishGuard</h1>
        <p class="subtitle">AI-inspired phishing email scanner</p>

        <form action="/analyze" method="POST">
            <label for="email_text">Paste email text below:</label>

            <textarea 
                name="email_text" 
                id="email_text" 
                placeholder="Paste a suspicious email here..."
            ></textarea>

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}

            <button type="submit">Analyze Email</button>
        </form>
    </div>
</body>
</html>
